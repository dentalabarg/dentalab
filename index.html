<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lista de Precios — YiQi ERP</title>

  <!-- Fuentes DS v1.2.4 -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <!-- SheetJS para leer Excel -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

  <style>
    /* ─── TOKENS DS v1.2.4 — MODO CLARO ─── */
    :root {
      --cyan:         #00CCFF;
      --cyan-dark:    #009BBF;
      --accent-blue:  #1A5299;
      --accent-green: #10B981;
      --brand-dark:   #0A0E27;

      /* Tema claro */
      --bg:           #F0F4F8;
      --surface:      #FFFFFF;
      --surface-2:    #F7FAFC;
      --border:       #DDE3EC;
      --text:         #0A0E27;
      --text-muted:   #5A6478;
      --shadow:       0 2px 12px rgba(10,14,39,0.08);
      --shadow-lg:    0 6px 32px rgba(10,14,39,0.13);

      --radius:       10px;
      --radius-sm:    6px;
      --font-ui:      'Inter', sans-serif;
      --font-mono:    'IBM Plex Mono', monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-ui);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ─── TOPBAR ─── */
    .topbar {
      background: var(--brand-dark);
      padding: 0 2rem;
      height: 58px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 16px rgba(0,204,255,0.10);
    }

    .topbar__logo {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
    }

    /* Logo SVG inline según regla DS: nunca como <img> */
    .logo-svg {
      width: 90px;
      height: auto;
    }

    .topbar__badge {
      font-size: 0.7rem;
      font-family: var(--font-mono);
      color: var(--cyan);
      border: 1px solid var(--cyan);
      border-radius: 4px;
      padding: 2px 7px;
      letter-spacing: 0.05em;
      opacity: 0.85;
    }

    /* ─── MAIN LAYOUT ─── */
    .main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 2.5rem 1.5rem 4rem;
    }

    /* ─── ENCABEZADO DE SECCIÓN ─── */
    .section-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 0.25rem;
    }

    .section-subtitle {
      font-size: 0.875rem;
      color: var(--text-muted);
      margin-bottom: 2rem;
    }

    /* ─── BUSCADOR ─── */
    .search-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 1.75rem;
    }

    .search-box {
      position: relative;
      width: 100%;
      max-width: 600px;
    }

    .search-box__icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      pointer-events: none;
    }

    .search-input {
      width: 100%;
      padding: 0.75rem 1rem 0.75rem 2.75rem;
      font-family: var(--font-ui);
      font-size: 1rem;
      border: 2px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--text);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      box-shadow: var(--shadow);
    }

    .search-input::placeholder { color: var(--text-muted); }

    .search-input:focus {
      border-color: var(--cyan);
      box-shadow: 0 0 0 3px rgba(0,204,255,0.15);
    }

    .search-count {
      text-align: center;
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-top: -1rem;
      margin-bottom: 1.25rem;
      font-family: var(--font-mono);
    }

    /* ─── IMPORT BOX ─── */
    .import-row {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 1.25rem;
    }

    .import-box {
      background: var(--surface);
      border: 1.5px dashed var(--border);
      border-radius: var(--radius);
      padding: 0.65rem 1rem;
      display: flex;
      align-items: center;
      gap: 0.65rem;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      font-size: 0.85rem;
      color: var(--text-muted);
      box-shadow: var(--shadow);
    }

    .import-box:hover {
      border-color: var(--cyan);
      color: var(--cyan-dark);
      background: #f0fbff;
    }

    .import-box__icon {
      color: var(--accent-green);
      flex-shrink: 0;
    }

    .import-box input[type="file"] {
      display: none;
    }

    .import-box__label {
      font-weight: 500;
      cursor: pointer;
    }

    .import-status {
      font-size: 0.78rem;
      font-family: var(--font-mono);
      color: var(--accent-green);
      margin-top: 0.35rem;
      text-align: right;
      min-height: 1.1em;
    }

    /* ─── TABLA ─── */
    .table-wrap {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow-lg);
      overflow: hidden;
      border: 1px solid var(--border);
    }

    .table-scroll {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }

    thead {
      background: var(--brand-dark);
      position: sticky;
      top: 0;
      z-index: 2;
    }

    thead th {
      padding: 0.85rem 1.1rem;
      text-align: left;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #FFFFFF;
      white-space: nowrap;
    }

    thead th:nth-child(1) { width: 130px; }
    thead th:nth-child(2) { width: auto; }
    thead th:nth-child(3),
    thead th:nth-child(4),
    thead th:nth-child(5) { width: 130px; text-align: right; }

    /* Stock badges */
    .stock-badge {
      display: inline-block;
      font-family: var(--font-mono);
      font-size: 0.82rem;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 20px;
      text-align: center;
      min-width: 48px;
    }
    .stock-ok   { background: rgba(16,185,129,0.12); color: #0a8057; }
    .stock-bajo { background: rgba(245,158,11,0.13);  color: #b45309; }
    .stock-sin  { background: rgba(239,68,68,0.11);   color: #b91c1c; }

    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
    }

    tbody tr:last-child { border-bottom: none; }

    tbody tr:hover { background: #F0FBFF; }

    tbody td {
      padding: 0.75rem 1.1rem;
      color: var(--text);
      vertical-align: middle;
    }

    /* SKU */
    tbody td:nth-child(1) {
      font-family: var(--font-mono);
      font-size: 0.82rem;
      color: var(--accent-blue);
      font-weight: 500;
    }

    /* Nombre */
    tbody td:nth-child(2) {
      font-weight: 500;
    }

    /* CRM / Precio */
    tbody td:nth-child(3),
    tbody td:nth-child(4) {
      font-family: var(--font-mono);
      font-size: 0.88rem;
      text-align: right;
    }

    tbody td:nth-child(3) { color: var(--text-muted); }

    tbody td:nth-child(4) {
      font-weight: 600;
      color: var(--brand-dark);
    }

    /* Fila vacía */
    .empty-row td {
      text-align: center;
      padding: 3.5rem 1rem;
      color: var(--text-muted);
      font-size: 0.95rem;
    }

    .empty-icon {
      font-size: 2rem;
      margin-bottom: 0.5rem;
      display: block;
    }

    /* ─── HIGHLIGHT de búsqueda ─── */
    mark {
      background: rgba(0,204,255,0.25);
      color: inherit;
      border-radius: 2px;
      padding: 0 1px;
    }

    /* ─── FOOTER ─── */
    .footer {
      text-align: center;
      padding: 2rem;
      font-size: 0.78rem;
      color: var(--text-muted);
      font-family: var(--font-mono);
    }

    /* ─── MOBILE ≤ 980px ─── */
    @media (max-width: 980px) {
      .main { padding: 1.5rem 1rem 3rem; }
      .section-title { font-size: 1.2rem; }
      .search-input { font-size: 0.9rem; }
      thead th:nth-child(3),
      thead th:nth-child(4),
      thead th:nth-child(5) { width: 110px; }
    }

    @media (max-width: 600px) {
      .topbar { padding: 0 1rem; }
      .import-row { justify-content: stretch; }
      .import-box { width: 100%; }
    }
  </style>
</head>

<body>

  <!-- TOPBAR -->
  <header class="topbar">
    <a class="topbar__logo" href="#">
      <!-- Logo YiQi inline SVG (DS: nunca como <img>) -->
      <svg class="logo-svg" viewBox="0 0 100 65" fill="none" xmlns="http://www.w3.org/2000/svg" aria-label="YiQi ERP">
        <text x="0" y="46" font-family="Inter, sans-serif" font-weight="700" font-size="38" fill="#FFFFFF" letter-spacing="-1">Yi</text>
        <text x="44" y="46" font-family="Inter, sans-serif" font-weight="700" font-size="38" fill="#00CCFF" letter-spacing="-1">Qi</text>
        <rect x="0" y="52" width="100" height="2.5" rx="1.25" fill="#00CCFF" opacity="0.5"/>
      </svg>
    </a>
    <span class="topbar__badge">DS v1.2.4 · Claro</span>
  </header>

  <!-- CONTENIDO PRINCIPAL -->
  <main class="main">

    <h1 class="section-title">Lista de Precios</h1>
    <p class="section-subtitle">Buscá por SKU, nombre, costo o precio. Los datos se cargan desde tu archivo Excel.</p>

    <!-- BUSCADOR CENTRADO -->
    <div class="search-wrap">
      <div class="search-box">
        <svg class="search-box__icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input
          type="search"
          id="searchInput"
          class="search-input"
          placeholder="Buscar por SKU, nombre, costo o precio…"
          autocomplete="off"
          spellcheck="false"
        />
      </div>
    </div>
    <div class="search-count" id="searchCount"></div>

    <!-- BOX DE IMPORTACIÓN -->
    <div class="import-row">
      <label class="import-box" id="importBox" title="Importar archivo Excel (.xlsx, .xls)">
        <svg class="import-box__icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="12" y1="18" x2="12" y2="12"/>
          <polyline points="9 15 12 12 15 15"/>
        </svg>
        <span class="import-box__label">Importar Excel</span>
        <input type="file" id="fileInput" accept=".xlsx,.xls,.csv" />
      </label>
    </div>
    <div class="import-status" id="importStatus"></div>

    <!-- TABLA -->
    <div class="table-wrap">
      <div class="table-scroll">
        <table id="priceTable">
          <thead>
            <tr>
              <th>SKU</th>
              <th>Nombre del artículo</th>
              <th style="text-align:right">CRM (Costo)</th>
              <th style="text-align:right">Lista 1 — Contado</th>
              <th style="text-align:right">Stock</th>
            </tr>
          </thead>
          <tbody id="tableBody">
            <tr class="empty-row">
              <td colspan="5">
                <span class="empty-icon">📂</span>
                Importá un archivo Excel para ver la lista de precios
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

  </main>

  <footer class="footer">
    © 2026 YiQi ERP — Lista de precios interna
  </footer>

  <script>
    /* ── ESTADO ── */
    let allRows = [];   // Array de objetos: { sku, nombre, crm, lista1 }

    /* ── MAPEO DE COLUMNAS (tolerante a variaciones de nombre) ── */
    const COL_MAPS = {
      sku:    ['sku', 'cod', 'código', 'codigo', 'code', 'art', 'articulo', 'artículo id', 'item'],
      nombre: ['nombre', 'name', 'descripcion', 'descripción', 'description', 'producto', 'artículo', 'articulo'],
      crm:    ['crm', 'costo', 'cost', 'precio costo', 'costo unitario', 'crm (costo)', 'coste'],
      lista1: ['lista 1', 'lista1', 'contado', 'lista 1 - contado', 'lista 1 contado', 'precio venta', 'precio lista', 'pvp', 'precio final'],
      stock:  ['stock', 'existencia', 'existencias', 'cantidad', 'qty', 'disponible', 'inventario', 'unidades']
    };

    function detectColumn(headers, key) {
      const options = COL_MAPS[key];
      for (const h of headers) {
        const norm = h.toString().toLowerCase().trim();
        if (options.some(opt => norm.includes(opt) || opt.includes(norm))) return h;
      }
      return null;
    }

    /* ── FORMATEO DE MONEDA ── */
    function formatMoney(val) {
      if (val === null || val === undefined || val === '') return '—';
      const num = parseFloat(String(val).replace(/[^0-9.,\-]/g, '').replace(',', '.'));
      if (isNaN(num)) return val;
      return '$ ' + num.toLocaleString('es-AR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    /* ── LEER EXCEL ── */
    document.getElementById('fileInput').addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (!file) return;

      const status = document.getElementById('importStatus');
      status.textContent = 'Leyendo archivo…';

      const reader = new FileReader();
      reader.onload = function(ev) {
        try {
          const wb = XLSX.read(ev.target.result, { type: 'array' });
          const ws = wb.Sheets[wb.SheetNames[0]];
          const data = XLSX.utils.sheet_to_json(ws, { defval: '' });

          if (data.length === 0) {
            status.textContent = '⚠️ El archivo está vacío o no tiene filas de datos.';
            return;
          }

          const headers = Object.keys(data[0]);

          const colSku    = detectColumn(headers, 'sku');
          const colNombre = detectColumn(headers, 'nombre');
          const colCrm    = detectColumn(headers, 'crm');
          const colLista1 = detectColumn(headers, 'lista1');
          const colStock  = detectColumn(headers, 'stock');

          allRows = data.map(row => ({
            sku:    colSku    ? row[colSku]    : '',
            nombre: colNombre ? row[colNombre] : '',
            crm:    colCrm    ? row[colCrm]    : '',
            lista1: colLista1 ? row[colLista1] : '',
            stock:  colStock  ? row[colStock]  : ''
          })).filter(r => r.sku || r.nombre); // eliminar filas completamente vacías

          const label = file.name.length > 28 ? file.name.slice(0, 26) + '…' : file.name;
          status.textContent = `✔ ${label} — ${allRows.length} artículos cargados`;

          document.getElementById('searchInput').value = '';
          renderTable(allRows, '');
        } catch (err) {
          status.textContent = '❌ Error al leer el archivo: ' + err.message;
        }
      };
      reader.readAsArrayBuffer(file);
    });

    /* ── RENDER DE STOCK con badge de color ── */
    function renderStock(val, q) {
      if (val === null || val === undefined || val === '') return '<span style="color:var(--text-muted)">—</span>';
      const num = parseFloat(String(val).replace(',', '.'));
      const display = isNaN(num) ? escapeHtml(String(val)) : num.toLocaleString('es-AR');
      const highlighted = q ? display.replace(new RegExp(escapeHtml(q).replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi'), m => `<mark>${m}</mark>`) : display;

      let badgeClass = 'stock-ok';
      if (!isNaN(num)) {
        if (num <= 0)  badgeClass = 'stock-sin';
        else if (num <= 5) badgeClass = 'stock-bajo';
      }
      return `<span class="stock-badge ${badgeClass}">${highlighted}</span>`;
    }

    /* ── BÚSQUEDA EN VIVO ── */
    document.getElementById('searchInput').addEventListener('input', function() {
      const q = this.value.trim();
      if (allRows.length === 0) return;

      const filtered = q
        ? allRows.filter(r =>
            String(r.sku).toLowerCase().includes(q.toLowerCase()) ||
            String(r.nombre).toLowerCase().includes(q.toLowerCase()) ||
            String(r.crm).toLowerCase().includes(q.toLowerCase()) ||
            String(r.lista1).toLowerCase().includes(q.toLowerCase())
          )
        : allRows;

      renderTable(filtered, q);
    });

    /* ── HIGHLIGHT ── */
    function highlight(text, q) {
      if (!q) return escapeHtml(text);
      const safe = escapeHtml(text);
      const safeQ = escapeHtml(q).replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      return safe.replace(new RegExp(safeQ, 'gi'), m => `<mark>${m}</mark>`);
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    /* ── RENDER DE TABLA ── */
    function renderTable(rows, q) {
      const tbody = document.getElementById('tableBody');
      const count = document.getElementById('searchCount');

      if (rows.length === 0) {
        tbody.innerHTML = `<tr class="empty-row"><td colspan="5">
          <span class="empty-icon">🔍</span>
          No se encontraron resultados para "<strong>${escapeHtml(q)}</strong>"
        </td></tr>`;
        count.textContent = '0 resultados';
        return;
      }

      tbody.innerHTML = rows.map(r => `
        <tr>
          <td>${highlight(r.sku, q)}</td>
          <td>${highlight(r.nombre, q)}</td>
          <td>${highlight(formatMoney(r.crm), q)}</td>
          <td>${highlight(formatMoney(r.lista1), q)}</td>
          <td>${renderStock(r.stock, q)}</td>
        </tr>
      `).join('');

      if (q) {
        count.textContent = `${rows.length} resultado${rows.length !== 1 ? 's' : ''} para "${q}"`;
      } else {
        count.textContent = `${rows.length} artículo${rows.length !== 1 ? 's' : ''}`;
      }
    }

    /* ── DRAG & DROP sobre el import box ── */
    const importBox = document.getElementById('importBox');

    importBox.addEventListener('dragover', e => {
      e.preventDefault();
      importBox.style.borderColor = 'var(--cyan)';
      importBox.style.background  = '#f0fbff';
    });

    importBox.addEventListener('dragleave', () => {
      importBox.style.borderColor = '';
      importBox.style.background  = '';
    });

    importBox.addEventListener('drop', e => {
      e.preventDefault();
      importBox.style.borderColor = '';
      importBox.style.background  = '';
      const file = e.dataTransfer.files[0];
      if (file) {
        const dt = new DataTransfer();
        dt.items.add(file);
        document.getElementById('fileInput').files = dt.files;
        document.getElementById('fileInput').dispatchEvent(new Event('change'));
      }
    });
  </script>

</body>
</html>
