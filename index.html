<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lista de Precios — Dentalab</title>

  <!-- Fuentes DS v1.2.4 -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <!-- SheetJS para leer Excel -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

  <style>
    /* ─── TOKENS DS v1.2.4 — MODO CLARO ─── */
    :root {
      --cyan:         #00CCFF;
      --cyan-dark:    #009BBF;
      --accent-blue:  #1A5299;
      --accent-green: #10B981;
      --brand-dark:   #0A0E27;

      /* Tema claro */
      --bg:           #F0F4F8;
      --surface:      #FFFFFF;
      --surface-2:    #F7FAFC;
      --border:       #DDE3EC;
      --text:         #0A0E27;
      --text-muted:   #5A6478;
      --shadow:       0 2px 12px rgba(10,14,39,0.08);
      --shadow-lg:    0 6px 32px rgba(10,14,39,0.13);

      --radius:       10px;
      --radius-sm:    6px;
      --font-ui:      'Inter', sans-serif;
      --font-mono:    'IBM Plex Mono', monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-ui);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ─── TOPBAR ─── */
    .topbar {
      background: var(--brand-dark);
      padding: 0 2rem;
      height: 58px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 16px rgba(0,204,255,0.10);
    }

    .topbar__logo {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
    }

    .logo-img {
      height: 38px;
      width: auto;
      object-fit: contain;
      /* El fondo del topbar es oscuro, el logo tiene fondo negro → filter para hacerlo transparente */
      filter: brightness(0) invert(1);
    }

    .topbar__badge {
      font-size: 0.7rem;
      font-family: var(--font-mono);
      color: var(--cyan);
      border: 1px solid var(--cyan);
      border-radius: 4px;
      padding: 2px 7px;
      letter-spacing: 0.05em;
      opacity: 0.85;
    }

    /* ─── MAIN LAYOUT ─── */
    .main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 2.5rem 1.5rem 4rem;
    }

    /* ─── ENCABEZADO DE SECCIÓN ─── */
    .section-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 0.25rem;
    }

    .section-subtitle {
      font-size: 0.875rem;
      color: var(--text-muted);
      margin-bottom: 2rem;
    }

    /* ─── BUSCADOR ─── */
    .search-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 1.75rem;
    }

    .search-box {
      position: relative;
      width: 100%;
      max-width: 600px;
    }

    .search-box__icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      pointer-events: none;
    }

    .search-input {
      width: 100%;
      padding: 0.75rem 1rem 0.75rem 2.75rem;
      font-family: var(--font-ui);
      font-size: 1rem;
      border: 2px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--text);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      box-shadow: var(--shadow);
    }

    .search-input::placeholder { color: var(--text-muted); }

    .search-input:focus {
      border-color: var(--cyan);
      box-shadow: 0 0 0 3px rgba(0,204,255,0.15);
    }

    .search-count {
      text-align: center;
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-top: -1rem;
      margin-bottom: 1.25rem;
      font-family: var(--font-mono);
    }

    /* ─── IMPORT BOX ─── */
    .import-row {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 1.25rem;
    }

    .import-box {
      background: var(--surface);
      border: 1.5px dashed var(--border);
      border-radius: var(--radius);
      padding: 0.65rem 1rem;
      display: flex;
      align-items: center;
      gap: 0.65rem;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      font-size: 0.85rem;
      color: var(--text-muted);
      box-shadow: var(--shadow);
    }

    .import-box:hover {
      border-color: var(--cyan);
      color: var(--cyan-dark);
      background: #f0fbff;
    }

    .import-box__icon {
      color: var(--accent-green);
      flex-shrink: 0;
    }

    .import-box input[type="file"] {
      display: none;
    }

    .import-box__label {
      font-weight: 500;
      cursor: pointer;
    }

    .import-status {
      font-size: 0.78rem;
      font-family: var(--font-mono);
      color: var(--accent-green);
      margin-top: 0.35rem;
      text-align: right;
      min-height: 1.1em;
    }

    /* ─── TABLA ─── */
    .table-wrap {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow-lg);
      overflow: hidden;
      border: 1px solid var(--border);
    }

    .table-scroll {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }

    thead {
      background: var(--brand-dark);
      position: sticky;
      top: 0;
      z-index: 2;
    }

    thead th {
      padding: 0.85rem 1.1rem;
      text-align: left;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #FFFFFF;
      white-space: nowrap;
    }

    thead th:nth-child(1) { width: 130px; }
    thead th:nth-child(2) { width: auto; }
    thead th:nth-child(3),
    thead th:nth-child(4),
    thead th:nth-child(5) { width: 130px; text-align: right; }

    /* Stock badges */
    .stock-badge {
      display: inline-block;
      font-family: var(--font-mono);
      font-size: 0.82rem;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 20px;
      text-align: center;
      min-width: 48px;
    }
    .stock-ok   { background: rgba(16,185,129,0.12); color: #0a8057; }
    .stock-bajo { background: rgba(245,158,11,0.13);  color: #b45309; }
    .stock-sin  { background: rgba(239,68,68,0.11);   color: #b91c1c; }

    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
    }

    tbody tr:last-child { border-bottom: none; }

    tbody tr:hover { background: #F0FBFF; }

    tbody td {
      padding: 0.75rem 1.1rem;
      color: var(--text);
      vertical-align: middle;
    }

    /* SKU */
    tbody td:nth-child(1) {
      font-family: var(--font-mono);
      font-size: 0.82rem;
      color: var(--accent-blue);
      font-weight: 500;
    }

    /* Nombre */
    tbody td:nth-child(2) {
      font-weight: 500;
    }

    /* CRM / Precio */
    tbody td:nth-child(3),
    tbody td:nth-child(4) {
      font-family: var(--font-mono);
      font-size: 0.88rem;
      text-align: right;
    }

    tbody td:nth-child(3) { color: var(--text-muted); }

    tbody td:nth-child(4) {
      font-weight: 600;
      color: var(--brand-dark);
    }

    /* Fila vacía */
    .empty-row td {
      text-align: center;
      padding: 3.5rem 1rem;
      color: var(--text-muted);
      font-size: 0.95rem;
    }

    .empty-icon {
      font-size: 2rem;
      margin-bottom: 0.5rem;
      display: block;
    }

    /* ─── HIGHLIGHT de búsqueda ─── */
    mark {
      background: rgba(0,204,255,0.25);
      color: inherit;
      border-radius: 2px;
      padding: 0 1px;
    }

    /* ─── FOOTER ─── */
    .footer {
      text-align: center;
      padding: 2rem;
      font-size: 0.78rem;
      color: var(--text-muted);
      font-family: var(--font-mono);
    }

    /* ─── MOBILE ≤ 980px ─── */
    @media (max-width: 980px) {
      .main { padding: 1.5rem 1rem 3rem; }
      .section-title { font-size: 1.2rem; }
      .search-input { font-size: 0.9rem; }
      thead th:nth-child(3),
      thead th:nth-child(4),
      thead th:nth-child(5) { width: 110px; }
    }

    @media (max-width: 600px) {
      .topbar { padding: 0 1rem; }
      .import-row { justify-content: stretch; }
      .import-box { width: 100%; }
    }

    /* ─── PAGINACIÓN ─── */
    .pagination {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      padding: 1.25rem 1rem;
      flex-wrap: wrap;
    }

    .page-btn {
      min-width: 36px;
      height: 36px;
      padding: 0 10px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--surface);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 0.82rem;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .page-btn:hover:not(:disabled) {
      border-color: var(--cyan);
      color: var(--cyan-dark);
      background: #f0fbff;
    }

    .page-btn.active {
      background: var(--brand-dark);
      border-color: var(--brand-dark);
      color: #fff;
      font-weight: 700;
    }

    .page-btn:disabled {
      opacity: 0.35;
      cursor: default;
    }

    .page-ellipsis {
      color: var(--text-muted);
      font-family: var(--font-mono);
      font-size: 0.82rem;
      padding: 0 4px;
      line-height: 36px;
    }

    .page-info {
      font-size: 0.78rem;
      font-family: var(--font-mono);
      color: var(--text-muted);
      text-align: center;
      padding-bottom: 0.75rem;
    }

  </style>
</head>

  <main class="main">

    <!-- BUSCADOR CENTRADO -->
    <div class="search-wrap">
      <div class="search-box">
        <svg class="search-box__icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

        <input
          type="search"
          id="searchInput"
          class="search-input"
          placeholder="Buscar por SKU, nombre, costo o precio…"

    <div class="search-count" id="searchCount"></div>

    <!-- BOX DE IMPORTACIÓN -->
    <div class="import-row">
      <label class="import-box" id="importBox" title="Importar archivo Excel (.xlsx, .xls)">
        <svg class="import-box__icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>

        <span class="import-box__label">Importar Excel</span>
        <input type="file" id="fileInput" accept=".xlsx,.xls,.csv" />

    <!-- TABLA -->
    <div class="table-wrap">
      <div class="table-scroll">

            <tr>
              <th>SKU</th>

  <script>
    /* ── ESTADO ── */
    let allRows = [];        // todos los artículos cargados
    let filteredRows = [];   // resultado del filtro actual
    let currentPage = 1;
    const PAGE_SIZE  = 100;

    /* ── MAPEO DE COLUMNAS (tolerante a variaciones de nombre) ── */
    const COL_MAPS = {
      sku:    ['sku', 'cod', 'código', 'codigo', 'code', 'art', 'articulo', 'artículo id', 'item'],
      nombre: ['nombre', 'name', 'descripcion', 'descripción', 'description', 'producto', 'artículo', 'articulo'],
      crm:    ['crm', 'costo', 'cost', 'precio costo', 'costo unitario', 'crm (costo)', 'coste'],
      lista1: ['lista 1', 'lista1', 'contado', 'lista 1 - contado', 'lista 1 contado', 'precio venta', 'precio lista', 'pvp', 'precio final'],
      stock:  ['stock', 'existencia', 'existencias', 'cantidad', 'qty', 'disponible', 'inventario', 'unidades']
    };

    function detectColumn(headers, key) {
      const options = COL_MAPS[key];
      for (const h of headers) {
        const norm = h.toString().toLowerCase().trim();
        if (options.some(opt => norm.includes(opt) || opt.includes(norm))) return h;
      }
      return null;
    }

    /* ── FORMATEO DE MONEDA ── */
    function formatMoney(val) {
      if (val === null || val === undefined || val === '') return '—';
      const num = parseFloat(String(val).replace(/[^0-9.,\-]/g, '').replace(',', '.'));
      if (isNaN(num)) return val;
      return '$ ' + num.toLocaleString('es-AR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    /* ── LEER EXCEL ── */
    document.getElementById('fileInput').addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (!file) return;

      const status = document.getElementById('importStatus');
      status.textContent = 'Leyendo archivo…';

      const reader = new FileReader();
      reader.onload = function(ev) {
        try {
          const wb = XLSX.read(ev.target.result, { type: 'array' });
          const ws = wb.Sheets[wb.SheetNames[0]];
          const data = XLSX.utils.sheet_to_json(ws, { defval: '' });

          if (data.length === 0) {
            status.textContent = '⚠️ El archivo está vacío o no tiene filas de datos.';
            return;
          }

          const headers = Object.keys(data[0]);

          const colSku    = detectColumn(headers, 'sku');
          const colNombre = detectColumn(headers, 'nombre');
          const colCrm    = detectColumn(headers, 'crm');
          const colLista1 = detectColumn(headers, 'lista1');
          const colStock  = detectColumn(headers, 'stock');

          allRows = data.map(row => ({
            sku:    colSku    ? row[colSku]    : '',
            nombre: colNombre ? row[colNombre] : '',
            crm:    colCrm    ? row[colCrm]    : '',
            lista1: colLista1 ? row[colLista1] : '',
            stock:  colStock  ? row[colStock]  : ''
          })).filter(r => r.sku || r.nombre); // eliminar filas completamente vacías

          const label = file.name.length > 28 ? file.name.slice(0, 26) + '…' : file.name;
          status.textContent = `✔ ${label} — ${allRows.length} artículos cargados`;

          document.getElementById('searchInput').value = '';
          filteredRows = allRows; renderTable(1, '');
        } catch (err) {
          status.textContent = '❌ Error al leer el archivo: ' + err.message;
        }
      };
      reader.readAsArrayBuffer(file);
    });

    /* ── RENDER DE STOCK con badge de color ── */
    function renderStock(val, q) {
      if (val === null || val === undefined || val === '') return '<span style="color:var(--text-muted)">—</span>';
      const num = parseFloat(String(val).replace(',', '.'));
      const display = isNaN(num) ? escapeHtml(String(val)) : num.toLocaleString('es-AR');
      const highlighted = q ? display.replace(new RegExp(escapeHtml(q).replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi'), m => `<mark>${m}</mark>`) : display;

      let badgeClass = 'stock-ok';
      if (!isNaN(num)) {
        if (num <= 0)  badgeClass = 'stock-sin';
        else if (num <= 5) badgeClass = 'stock-bajo';
      }
      return `<span class="stock-badge ${badgeClass}">${highlighted}</span>`;
    }

    /* ── BÚSQUEDA EN VIVO ── */
    document.getElementById('searchInput').addEventListener('input', function() {
      const q = this.value.trim();
      if (allRows.length === 0) return;

      filteredRows = q
        ? allRows.filter(r =>
            String(r.sku).toLowerCase().includes(q.toLowerCase()) ||
            String(r.nombre).toLowerCase().includes(q.toLowerCase()) ||
            String(r.crm).toLowerCase().includes(q.toLowerCase()) ||
            String(r.lista1).toLowerCase().includes(q.toLowerCase()) ||
            String(r.stock).toLowerCase().includes(q.toLowerCase())
          )
        : allRows;

      renderTable(1, q);
    });

    /* ── HIGHLIGHT ── */
    function highlight(text, q) {
      if (!q) return escapeHtml(text);
      const safe = escapeHtml(text);
      const safeQ = escapeHtml(q).replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      return safe.replace(new RegExp(safeQ, 'gi'), m => `<mark>${m}</mark>`);
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    /* ── RENDER DE TABLA (con paginación) ── */
    function renderTable(page, q) {
      currentPage = page;
      const tbody    = document.getElementById('tableBody');
      const count    = document.getElementById('searchCount');
      const pageInfo = document.getElementById('pageInfo');
      const pagDiv   = document.getElementById('pagination');
      const rows     = filteredRows;

      if (rows.length === 0) {
        tbody.innerHTML = `<tr class="empty-row"><td colspan="5">
          <span class="empty-icon">🔍</span>
          No se encontraron resultados para "<strong>${escapeHtml(q)}</strong>"
        </td></tr>`;
        count.textContent = '0 resultados';
        pageInfo.textContent = '';
        pagDiv.innerHTML = '';
        return;
      }

      const totalPages = Math.ceil(rows.length / PAGE_SIZE);
      const safePage   = Math.min(Math.max(1, page), totalPages);
      currentPage      = safePage;
      const start      = (safePage - 1) * PAGE_SIZE;
      const end        = Math.min(start + PAGE_SIZE, rows.length);
      const pageRows   = rows.slice(start, end);

      tbody.innerHTML = pageRows.map(r => `
        <tr>
          <td>${highlight(r.sku, q)}</td>
          <td>${highlight(r.nombre, q)}</td>
          <td>${renderStock(r.stock, q)}</td>
          <td>${highlight(formatMoney(r.crm), q)}</td>
          <td>${highlight(formatMoney(r.lista1), q)}</td>
        </tr>
      `).join('');

      // Contador superior
      if (q) {
        count.textContent = `${rows.length} resultado${rows.length !== 1 ? 's' : ''} para "${q}"`;
      } else {
        count.textContent = `${rows.length} artículo${rows.length !== 1 ? 's' : ''}`;
      }

      // Info de página
      if (totalPages > 1) {
        pageInfo.textContent = `Mostrando ${start + 1}–${end} de ${rows.length} artículos`;
      } else {
        pageInfo.textContent = '';
      }

      // Controles de paginación
      renderPagination(safePage, totalPages, q);

      // Scroll suave al inicio de la tabla al cambiar página
      if (page !== currentPage || page > 1) {
        document.getElementById('priceTable').scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
    }

    function renderPagination(current, total, q) {
      const div = document.getElementById('pagination');
      if (total <= 1) { div.innerHTML = ''; return; }

      const btn = (label, page, disabled = false, active = false) => {
        const cls = ['page-btn', active ? 'active' : ''].filter(Boolean).join(' ');
        return `<button class="${cls}" ${disabled ? 'disabled' : ''}
          onclick="renderTable(${page}, ${JSON.stringify(q)})">${label}</button>`;
      };

      const ellipsis = () => `<span class="page-ellipsis">…</span>`;

      let pages = [];

      // Siempre: primera, última, y ventana de 2 alrededor de la actual
      const show = new Set([1, total]);
      for (let i = Math.max(2, current - 2); i <= Math.min(total - 1, current + 2); i++) show.add(i);
      const sorted = [...show].sort((a, b) => a - b);

      let html = '';
      html += btn('&laquo;', current - 1, current === 1);
      let prev = 0;
      for (const p of sorted) {
        if (p - prev > 1) html += ellipsis();
        html += btn(p, p, false, p === current);
        prev = p;
      }
      html += btn('&raquo;', current + 1, current === total);

      div.innerHTML = html;
    }

    /* ── DRAG & DROP sobre el import box ── */
    const importBox = document.getElementById('importBox');

    importBox.addEventListener('dragover', e => {
      e.preventDefault();
      importBox.style.borderColor = 'var(--cyan)';
      importBox.style.background  = '#f0fbff';
    });

    importBox.addEventListener('dragleave', () => {
      importBox.style.borderColor = '';
      importBox.style.background  = '';
    });

    importBox.addEventListener('drop', e => {
      e.preventDefault();
      importBox.style.borderColor = '';
      importBox.style.background  = '';
      const file = e.dataTransfer.files[0];
      if (file) {
        const dt = new DataTransfer();
        dt.items.add(file);
        document.getElementById('fileInput').files = dt.files;
        document.getElementById('fileInput').dispatchEvent(new Event('change'));
      }
    });
  </script>

</body>
</html>
